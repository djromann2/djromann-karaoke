<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DJ RomanN Karaoke</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎤 DJ RomanN Karaoke</h1>

    <p class="subtitle">
    55,295 Songs • 🇺🇸 English • 🇷🇺 Russian • 🇷🇴 Romanian • 🇺🇦 Ukrainian
</p>

 <div class="search-area">

    <input
        type="text"
        id="searchBox"
        placeholder="Search artist or song title..."
        autocomplete="off">

    <div id="counter"></div>

</div>

<div id="results">

    <div class="welcome">

        <h2>🎤 Welcome!</h2>

        <p>Search by artist or song title.</p>

        <br>

        <p>
            When you find your song,
            write the <strong>Artist</strong> and
            <strong>Song Title</strong> on your request card.
        </p>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="app.js"></script>

<footer class="footer">

    🎧 DJ, Karaoke & Events
    
    Powered by DJ RomanN

    <br>

    <a href="https://www.djromann.com" target="_blank">
        www.djromann.com
    </a>

</footer>

</body>
</html>
